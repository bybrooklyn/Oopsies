[themes.light.color]
background = "#f8fafc"
surface = "#ffffff"
text = "#1f2937"

[themes.dark.color]
background = "#0f172a"
surface = "#111827"
text = "#f8fafc"

[body]
margin = "0"
font-family = "'Avenir Next', 'Segoe UI', sans-serif"
background = "token(color.background)"
color = "token(color.text)"

["#root"]
padding = "3rem 1rem"

[".hero"]
display = "flex"
flex-direction = "column"
gap = "1rem"
max-width = "42rem"
margin = "0 auto 2rem"

[".panel"]
background = "token(color.surface)"
max-width = "42rem"
margin = "0 auto"

[".primary-action"]
background = "#196b67"
color = "#ffffff"
border = "0"
border-radius = "999px"
padding = "0.8rem 1rem"

[".secondary-action"]
align-self = "center"
