[themes.light.color]
background = "#f8fafc"
surface = "#ffffff"
text = "#1f2937"

[themes.dark.color]
background = "#0f172a"
surface = "#111827"
text = "#f8fafc"

[body]
margin = "0"
font-family = "'Avenir Next', 'Segoe UI', sans-serif"
background = "token(color.background)"
color = "token(color.text)"

["#root"]
padding = "3rem 1rem"

[".dashboard-grid"]
display = "grid"
grid-template-columns = "repeat(3, minmax(0, 1fr))"
gap = "1rem"
